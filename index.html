<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="robots" content="index, follow" />
    <title>Respect for Creators | Experience High-End UI Animations</title>
    <meta name="description" content="Welcome to Respect for Creators. Discover a premium collection of CSS3 animations, HTML5 scripts, and interactive UI components. Enter the experience." />
    <meta name="keywords" content="CSS3, HTML5, UI Design, Animation, Respect for Creators, Web Scripts" />
    <meta name="author" content="Respect for Creators" />

    <meta property="og:title" content="Respect for Creators | CSS3 Animations & Web UI Scripts" />
    <meta property="og:description" content="Elevate your web projects with professional animations and clean code. Enter the world of Respect for Creators." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://respectforcreators.com" />
    <meta property="og:image" content="https://respectforcreators.com/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Respect for Creators | Premium UI Assets" />
    <meta name="twitter:description" content="Professional CSS3 animations and UI scripts for modern web design." />
    <meta name="twitter:image" content="https://respectforcreators.com/og-image.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Inter:wght@100;400;900&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="logo_rfc_svg_favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" />

    <style>


        :root {
            --bg: #000;
            --neon: #e1ff00;
            --facet: #f6f396;
            --facet-base: #777;
        }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: opacity 2s;
        }

            body::before {
                content: '';
                position: fixed;
                top: 20px;
                left: 20px;
                right: 20px;
                bottom: 20px;
                border: 1px solid var(--neon);
                pointer-events: none;
                z-index: 100;
                transition: border-color 0.8s ease;
                opacity: 0.15;
            }

            body::after {
                content: 'RFC INTRO V1.1';
                position: fixed;
                bottom: 30px;
                right: 30px;
                font-family: 'Inter', sans-serif;
                font-size: clamp(8px, 1vw, 12px);
                font-weight: 900;
                color: var(--neon);
                letter-spacing: 0px;
                opacity: 0.35;
                z-index: 101;
                pointer-events: none;
            }

            body:has(.brand-container:hover)::before {
                opacity: 0.3;
            }

            body.fade-out {
                opacity: 0;
            }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: max-content;
            visibility: hidden;
            white-space: nowrap;
        }

        .brand-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            cursor: pointer;
        }

        .brand {
            display: flex;
            align-items: center;
        }

        .diamond-logo {
            width: 13em;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-0.35em);
            flex-shrink: 0;
            position: relative;
            filter: drop-shadow(0 0 0px var(--neon));
            transition: filter 1s ease;
        }

            .diamond-logo.glow-active {
                filter: drop-shadow(0 0 12px var(--neon));
            }

            .diamond-logo svg {
                width: 100%;
                height: auto;
                overflow: visible;
            }

        .rfc-orbit-path {
            fill: none;
            stroke: var(--neon);
            stroke-width: 0.5;
        }

        .brand-container:hover .f-facet-group {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .brand-container:hover .diamond-logo {
            filter: drop-shadow(0 0 6px var(--neon));
        }

        .f-static {
            fill: var(--facet-base);
            fill-opacity: 0;
            animation: fadeInBase 1s ease forwards 1s;
            transition: opacity 0.3s ease;
        }

        @keyframes fadeInBase {
            to {
                fill-opacity: 0.15;
            }
        }

        .f-sparkle {
            fill: var(--facet);
            fill-opacity: 0;
            transition: fill-opacity 0.25s ease, opacity 0.3s ease;
        }

        .diamond-logo svg g path {
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawDiamond 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes drawDiamond {
            to {
                stroke-dashoffset: 0;
            }
        }

        .separator {
            width: 0.25em;
            height: 9em;
            margin-left: 2em;
            margin-right: 0; 
            display: flex;
            align-items: center;
            z-index: 10;
            background: transparent;
        }

            .separator line {
                stroke: var(--neon);
                stroke-width: 3;
                stroke-dasharray: 110;
                stroke-dashoffset: 110;
                animation: drawLine 0.8s ease forwards 0.7s;
            }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
            padding-left: 2.5em;
        }

        .line-top {
            font-size: 3.2em;
            letter-spacing: 0.32em;
            color: #e0e0e0;
            font-weight: 600;
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 0.12em;
            opacity: 0;
            transform: translateX(-110%); 
            animation: slideFromLine 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.9s;
        }

        .line-bottom {
            font-size: 5.83em;
            letter-spacing: 0.035em;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            line-height: 0.85;
            opacity: 0;
            transform: translateX(-110%);
            animation: slideFromLine 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.1s;
        }

        @keyframes slideFromLine {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .rfc-enter {
            position: absolute;
            right: 3em; 
            bottom: 3.5em; 
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            letter-spacing: 0.8em;
            color: var(--neon);
            text-transform: uppercase;
            opacity: 0.7;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.5s;
            animation: pulseText 1s infinite ease-in-out;
            pointer-events: none;
        }

        .brand-container:hover .rfc-enter {
            opacity: 1;
            letter-spacing: 0.8em;
        }

        @keyframes pulseText {
            0%, 100% {
                opacity: 0.7;
                text-shadow: 0 0 10px var(--neon);
                font-weight: 700;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 10px var(--neon);
                font-weight: 700;
            }
        }
    </style>
</head>
<body>

    <div class="brand-container" id="mainContainer">
        <div class="brand-wrapper" onclick="triggerExit()">
            <div class="brand">
                <div class="diamond-logo" id="diamondBox">
                    <svg id="h-rfc-diamond-svg" viewBox="0 0 100 105" xmlns="http://www.w3.org/2000/svg">
                        <path id="singleOrbitPath" class="rfc-orbit-path" />
                        <g class="f-facet-group">
                            <g id="base-layer">
                                <polygon class="f-static" points="30,20 50,25 70,20 50,20" />
                                <polygon class="f-static" points="30,20 15,40 35,40 50,25" />
                                <polygon class="f-static" points="70,20 85,40 65,40 50,25" />
                                <polygon class="f-static" points="50,25 35,40 50,40 65,40" />
                                <polygon class="f-static" points="15,40 35,40 50,95" />
                                <polygon class="f-static" points="35,40 50,40 50,95" />
                                <polygon class="f-static" points="50,40 65,40 50,95" />
                                <polygon class="f-static" points="65,40 85,40 50,95" />
                            </g>
                            <g id="sparkle-layer">
                                <polygon class="f-sparkle" points="30,20 50,25 70,20 50,20" />
                                <polygon class="f-sparkle" points="30,20 15,40 35,40 50,25" />
                                <polygon class="f-sparkle" points="70,20 85,40 65,40 50,25" />
                                <polygon class="f-sparkle" points="50,25 35,40 50,40 65,40" />
                                <polygon class="f-sparkle" points="15,40 35,40 50,95" />
                                <polygon class="f-sparkle" points="35,40 50,40 50,95" />
                                <polygon class="f-sparkle" points="50,40 65,40 50,95" />
                                <polygon class="f-sparkle" points="65,40 85,40 50,95" />
                            </g>
                        </g>
                        <g stroke="var(--neon)" stroke-width="0.5" stroke-linejoin="round" stroke-linecap="round" fill="none">
                            <path d="M30 20 L70 20" />
                            <path d="M30 20 L50 25 L70 20" />
                            <path d="M30 20 L15 40" />
                            <path d="M70 20 L85 40" />
                            <path d="M30 20 L35 40" />
                            <path d="M70 20 L65 40" />
                            <path d="M50 25 L35 40" />
                            <path d="M50 25 L65 40" />
                            <path d="M50 25 L50 40" />
                            <path d="M15 40 L35 40 L50 40 L65 40 L85 40" />
                            <path d="M15 40 L50 95" />
                            <path d="M85 40 L50 95" />
                            <path d="M35 40 L50 95" />
                            <path d="M65 40 L50 95" />
                            <path d="M50 40 L50 95" />
                        </g>
                    </svg>
                </div>
                <div class="separator">
                    <svg viewBox="0 0 3 110" style="height:100%"><line x1="1.5" y1="0" x2="1.5" y2="110" /></svg>
                </div>
                <div class="brand-name">
                    <div class="line-top">RESPECT FOR</div>
                    <div class="line-bottom">CREATORS</div>
                </div>
            </div>
            <div class="rfc-enter">ENTER</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('mainContainer');
        const diamondBox = document.getElementById('diamondBox');
        const orbitPath = document.getElementById('singleOrbitPath');
        const sparkles = Array.from(document.querySelectorAll('.f-sparkle'));

        let rotation = 0;
        let isHovered = false;
        let isDrawing = true;
        let drawProgress = 1;
        let activeSparkle = true;

        function getPathData(angle) {
            const bbox = document.getElementById('base-layer').getBBox();
            const cx = bbox.x + bbox.width / 2;
            const cy = (bbox.y + bbox.height / 2) - (bbox.height * 0.05);
            const r = Math.max(bbox.width, bbox.height) * 0.73;
            const vDepth = r * 0.18;
            const vWidth = 0.15;
            const getPos = (a, dist) => ({ x: cx + dist * Math.cos(a + angle), y: cy + dist * Math.sin(a + angle) });
            const pStart = getPos(-Math.PI / 2 + vWidth, r);
            const pEnd = getPos(-Math.PI / 2 - vWidth, r);
            const vBottom = getPos(-Math.PI / 2, r - vDepth);
            const pOpposite = getPos(Math.PI / 2, r);
            return `M ${pStart.x},${pStart.y} A ${r},${r} 0 0 1 ${pOpposite.x},${pOpposite.y} A ${r},${r} 0 0 1 ${pEnd.x},${pEnd.y} L ${vBottom.x},${vBottom.y} Z`;
        }

        function individualSparkle(el) {
            if (!activeSparkle) return;
            el.style.fillOpacity = (0.75 - Math.random() * 0.6).toFixed(2);
            setTimeout(() => individualSparkle(el), 150 + Math.random() * 150);
        }

        function animate() {
            if (isHovered) {
                const target = Math.round(rotation / (Math.PI * 2)) * (Math.PI * 2);
                rotation += (target - rotation) * 0.1;
            } else {
                rotation += 0.007;
            }
            orbitPath.setAttribute('d', getPathData(rotation));
            if (isDrawing) {
                const totalLength = orbitPath.getTotalLength();
                orbitPath.style.strokeDasharray = totalLength;
                if (drawProgress > 0) {
                    drawProgress -= 0.015;
                    orbitPath.style.strokeDashoffset = totalLength * drawProgress;
                } else {
                    orbitPath.style.strokeDashoffset = 0;
                    isDrawing = false;
                    diamondBox.classList.add('glow-active');
                }
            }
            requestAnimationFrame(animate);
        }

        function rescale() {
            container.style.fontSize = "10px";
            const contentWidth = container.offsetWidth;
            const contentHeight = container.offsetHeight;
            const availableWidth = window.innerWidth - 80;
            const availableHeight = window.innerHeight - 80;
            const scale = Math.min(availableWidth / contentWidth, availableHeight / contentHeight);
            container.style.fontSize = Math.min(10 * scale, 14) + "px";
            container.style.visibility = "visible";
        }

        
        container.addEventListener('mouseenter', () => isHovered = true);
        container.addEventListener('mouseleave', () => isHovered = false);
        window.addEventListener('resize', rescale);

        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                triggerExit();
            }
        });

        window.addEventListener('load', () => {
            rescale();
            animate();
            setTimeout(() => {
                sparkles.forEach((s, i) => setTimeout(() => individualSparkle(s), i * 150));
            }, 1000);
        });

        function triggerExit() {
            
            if (document.body.classList.contains('fade-out')) return;

            activeSparkle = false;
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = "https://www.respectforcreators.com/home.html";
            }, 700);
        }
    </script>
</body>
</html>
