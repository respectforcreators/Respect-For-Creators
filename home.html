        window.animateHeaderLogo = function (start) {
            const headerLogo = document.querySelector('header .flower');

            if (start) {
                let currentIndex = 0;
                return setInterval(() => {
                    shapes.forEach(s => s.style.setProperty('fill', 'rgba(255,255,255,0.1)', 'important'));
                    if (shapes[currentIndex]) {
                        shapes[currentIndex].style.setProperty('fill', 'var(--neon)', 'important'); // Dein Neon-Gelb
                    }
                    currentIndex = (currentIndex + 1) % shapes.length;
                }, 80);
            }
            return null;
        };

       function updatePageTitle(file) {

    if (file.includes('main-info')) {
        title = "CSS3 Animations & HTML5 Scripts | Respect for Creators";
        desc = "Explore our core collection of unique HTML5 and CSS3 animations. Pure code crafted for maximum frontend performance.";
    } else if (file.includes('ui-loader')) {
        title = "Loading Animations & UI Loaders | Respect for Creators";
        desc = "Discover high-quality, lightweight CSS and SVG loader animations. Elevate your website's UX with smooth loading transitions.";
        keywords = "CSS loaders, SVG loaders, loading animations, UI spinners, frontend assets";
    } else if (file.includes('about-logo')) {
        title = "Our Story & Logo | Respect for Creators";
        desc = "The philosophy behind Respect for Creators. Learn more about our custom SVG logo mechanics and our mission for developers.";
    } else if (file.includes('ui-button')) {
        title = "Modern Button Animations | Respect for Creators";
        desc = "Premium CSS button hover effects and modern interaction designs. Clean, fully responsive snippets in neon, white, and gray.";
        keywords = "CSS buttons, button animations, hover effects, neon yellow button, UI interactions";
    } else if (file.includes('submit')) {
        title = "Submit Your Work | Creator Community";
        desc = "Are you a creator? Submit your own custom CSS animations or SVG designs and share your talent with the web developer community.";
        keywords = "submit asset, share code, developer community, CSS creators";
    } else if (file.includes('ui-motion')) {
        title = "Motion Design & UI Scripts | Respect for Creators";
        desc = "Advanced micro-interactions, smooth layout motions, and powerful UI scripts built with vanilla CSS and JavaScript.";
        keywords = "motion design, web transitions, micro-interactions, layout motions, vanilla JS scripts";
    } else if (file.includes('requests')) {
        title = "Custom Requests & Support | Respect for Creators";
        desc = "Missing a specific animation? Request custom UI assets or support our mission to keep high-quality code free and accessible.";
    } else if (file.includes('imprint')) {
        title = "Imprint | Respect for Creators";
        desc = "Legal disclosure and contact information for Respect for Creators.";
    } else if (file.includes('privacy')) {
        title = "Privacy Policy | Respect for Creators";
        desc = "Your data security matters. Read our comprehensive privacy policy regarding the use of our web asset platform.";
    } else if (file.includes('license')) {
        title = "License Details | Respect for Creators";
        desc = "Transparent licensing terms for all our CSS and SVG assets. Keep creating with our free, developer-friendly terms.";
    }

    // 1. Standard-Titel setzen
    document.title = title;

    // 2. Meta Description aktualisieren
    const metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = desc;

    // 3. Meta Keywords aktualisieren
    const metaKey = document.querySelector('meta[name="keywords"]');
    if (metaKey) metaKey.content = keywords;

    // 4. Open Graph Tags für Social Media aktualisieren
    const ogTitle = document.querySelector('meta[property="og:title"]');
    if (ogTitle) ogTitle.content = title;

    const ogDesc = document.querySelector('meta[property="og:description"]');
    if (ogDesc) ogDesc.content = desc;

    // 5. Twitter-Tags aktualisieren
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    if (twTitle) twTitle.content = title;

    const twDesc = document.querySelector('meta[name="twitter:description"]');
    if (twDesc) twDesc.content = desc;
}


        function createIframeContent(html, css, js) {
            const activeColor = localStorage.getItem('rfc-selected-color') || '#e1ff00';

            const style = "<style>" +
                ":root { --neon: " + activeColor + " !important; }" +
                "body,html{margin:0;padding:0;height:100%;width:100%;background:transparent;overflow:hidden;color:white;}" +
                css +
                "</style>";

            const receiver = "<script>" +
                "window.rfcColorHandler = function(e) {" +
                "  if(e.data && e.data.type === 'COLOR_UPDATE') {" +
                "    document.documentElement.style.setProperty('--neon', e.data.color);" +
                "  }" +
                "};" +
                "window.addEventListener('message', window.rfcColorHandler);" +
                "<\/script>";

            const script = "<script>try{(function(){" + (js || "") + "})();}catch(e){console.error('JS Error:',e)}<\/script>";

            return "<!DOCTYPE html><html style='--neon: " + activeColor + "'><head>" + style + "</head><body>" + html + receiver + script + "</body></html>";
        }

    
    
    function loadContent(file) {
    if (!container) return;

    let baseId = "nav-home";
    if (file.includes('ui-loader')) baseId = "nav-ui-loader";
    else if (file.includes('ui-motion')) baseId = "nav-ui-motion";
    else if (file.includes('ui-button')) baseId = "nav-ui-button";
    else if (file.includes('submit')) baseId = "nav-submit";
    else if (file.includes('requests')) baseId = "nav-requests";

    document.querySelectorAll('.nav-item, .mobile-nav a').forEach(item => {
        item.classList.remove('active');
    });

    const desktopItem = document.getElementById(baseId);
    if (desktopItem) desktopItem.classList.add('active');

    const mobileItem = document.getElementById(baseId + "-mob");
    if (mobileItem) mobileItem.classList.add('active');

    const mobileNavElement = document.getElementById('mobileNav');
    if (mobileNavElement) {
        mobileNavElement.classList.remove("open");
    }

    // ==========================================
    // NEU: URL-PARAMETER SETZEN STATT HASHTAGS
    // ==========================================
    let paramName = "home";
    if (file.includes('ui-loader')) paramName = "ui-loader";
    else if (file.includes('ui-motion')) paramName = "ui-motion";
    else if (file.includes('ui-button')) paramName = "ui-button";
    else if (file.includes('submit')) paramName = "submit";
    else if (file.includes('requests')) paramName = "requests";
    else if (file.includes('about-logo')) paramName = "about-logo";
    else if (file.includes('imprint')) paramName = "imprint";
    else if (file.includes('license')) paramName = "license";
    else if (file.includes('privacy')) paramName = "privacy";

    const cleanPath = window.location.pathname;
    const targetURL = `${cleanPath}?page=${paramName}`;

    // Nur pushen, wenn sich der Parameter tatsächlich unterscheidet
    if (window.location.search !== `?page=${paramName}`) {
        history.pushState({ page: file }, "", targetURL);
    }

    const startTime = Date.now();
    const minLoaderDuration = 1500;

    container.classList.remove("visible");

    setTimeout(() => {
        loader.style.display = "flex";

        setTimeout(() => {
            loader.classList.add("show");
            loader.classList.remove("loader-hide");
        }, 10);

        const cacheBuster = "t=" + Date.now();
        const fileWithCacheBuster = file.includes("?")
            ? `${file}&${cacheBuster}`
            : `${file}?${cacheBuster}`;

        fetch(fileWithCacheBuster)
            .then(resp => {
                if (!resp.ok) throw new Error("File not found: " + file);
                return resp.text();
            })
            .then(data => {
                container.innerHTML = data;

                const mailSpan = container.querySelector('#contact-mail');
                if (mailSpan) {
                    const user = mailSpan.getAttribute('data-user');
                    const domain = mailSpan.getAttribute('data-domain');
                    if (user && domain) {
                        mailSpan.textContent = user + '@' + domain;
                    }
                }

                window.scrollTo(0, 0);

                if (file.includes('main-info.html')) {
                    updateLibraryStats();
                }

                if (typeof updatePageTitle === "function") {
                    updatePageTitle(file);
                }

                setTimeout(() => {
                    const dataStorage = container.querySelector('#animation-data');
                    if (dataStorage) {
                        renderAnimationCards(dataStorage);
                    }
                }, 10);

                if (typeof initDemo === "function") {
                    initDemo(container);
                }

                const elapsed = Date.now() - startTime;
                const remainingTime = Math.max(0, minLoaderDuration - elapsed);

                setTimeout(() => {
                    loader.classList.remove("show");
                    loader.classList.add("loader-hide");

                    setTimeout(() => {
                        loader.style.display = "none";
                        container.classList.add("visible");
                        const supportBtn = document.querySelector('.support-button.diamond-energy');
                        if (supportBtn) {
                            supportBtn.classList.add('reveal');
                        }
                    }, 200);
                }, remainingTime);
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                container.innerHTML = "<p style='color:white;text-align:center;padding:50px;'>Inhalt konnte nicht geladen werden.</p>";
                loader.classList.remove("show");
                loader.style.display = "none";
                container.classList.add("visible");
            });

    }, 400);


    if (typeof mobileNav !== 'undefined' && mobileNav) {
        mobileNav.classList.remove("open");
    }
}





        const RFC_SHOWCASE_ENGINE = "V1.2";

        function renderAnimationCards(storage) {
            console.log("DEBUG - Aktive Farbe gefunden:", localStorage.getItem('rfc-selected-color'));
            const grid = document.getElementById('dynamic-grid');
            if (!grid) return;


            const activeColor = localStorage.getItem('rfc-selected-color') || '#e1ff00';


            document.documentElement.style.setProperty('--neon', activeColor);


            document.querySelectorAll('.rfc-dot').forEach(dot => {
                dot.classList.remove('rfc-active');
                if (dot.getAttribute('onclick') && dot.getAttribute('onclick').includes(activeColor)) {
                    dot.classList.add('rfc-active');
                }
            });


            grid.innerHTML = "";
            const items = storage.querySelectorAll('.anim-item');

            const cleanPower = (text) => {
                if (!text) return "";
                return text.split('\n')
                    .map(line => line.trimStart())
                    .join('\n')
                    .trim();
            };


            items.forEach(item => {
                const id = item.dataset.id;
                const name = item.dataset.name;
                const creator = item.dataset.creator || "Respect For Creators";
                const creatorLink = item.dataset.link || "#";


                const rawHTML = cleanPower(item.querySelector('.html-code').textContent);
                const cssCode = cleanPower(item.querySelector('.css-code').textContent);

        function animateHeaderDiamond() {
            const frame = document.getElementById('header-frame');
            const textBox = document.getElementById('h-rfc-box');
            const diamondSvg = document.getElementById('h-rfc-diamond-svg');
            const rfcText = document.getElementById('h-rfc-text');

            if (!frame || !textBox) return;

            const offset = 6;
            textBox.style.width = `${frame.offsetWidth - (offset * 2)}px`;
            textBox.style.left = `${offset}px`;
            textBox.style.bottom = `${offset}px`;

            setTimeout(() => frame.classList.add('visible'), 500);

            const points = ["M15 40 L50 95 L85 40 L70 20 L30 20 Z", "M30 20 L70 20", "M15 40 L35 40 L65 40 L85 40", "M30 20 L15 40", "M70 20 L85 40", "M30 20 L35 40", "M70 20 L65 40", "M50 25 L35 40", "M50 25 L65 40", "M50 25 L50 40", "M30 20 L50 25 L70 20", "M15 40 L35 40 L50 95", "M85 40 L65 40 L50 95", "M35 40 L50 40 L65 40", "M50 40 L50 95"];

            points.forEach((d, i) => {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", d);
                p.setAttribute("stroke", "var(--neon)");
                p.setAttribute("fill", "none");
                p.setAttribute("stroke-width", "1.4");

                p.classList.add('rfc-facet');
                diamondSvg.appendChild(p);
                const l = p.getTotalLength();
                p.style.strokeDasharray = l;
                p.style.strokeDashoffset = l;
                p.animate([{ strokeDashoffset: l }, { strokeDashoffset: 0 }], { duration: 800, delay: 1000 + (i * 40), fill: 'forwards' });
            });

            setTimeout(() => {
                const r1 = document.getElementById('h-rect1');
                const r2 = document.getElementById('h-rect2');
                [r1, r2].forEach((r, i) => {
                    if (!r) return;
                    const l = r.getTotalLength();
                    r.style.strokeDasharray = l;
                    r.style.strokeDashoffset = i === 0 ? l : -l;
                    r.style.opacity = 1;
                    r.animate([{ strokeDashoffset: i === 0 ? l : -l }, { strokeDashoffset: 0 }], { duration: 1500, fill: 'forwards' });
                });
            }, 1200);

            setTimeout(() => {
                textBox.style.opacity = "1";
                setTimeout(() => {
                    textBox.classList.add('active');
                    if (rfcText) rfcText.style.color = "#000000";
                }, 300);
            }, 1800);

            const animCorner = (id, delay) => {
                const p = document.getElementById(id);
                if (!p) return;
                const l = p.getTotalLength();
                p.style.strokeDasharray = l; p.style.strokeDashoffset = l; p.style.opacity = 1;
                setTimeout(() => {
                    p.animate([{ strokeDashoffset: l }, { strokeDashoffset: 0 }], { duration: 1000, fill: 'forwards' });
                }, delay);
            };
            animCorner('h-path-tl', 2800);
            animCorner('h-path-br', 2800);
        }


        window.animateHeaderLogo = function (start) {
            const diamondSvg = document.getElementById('h-rfc-diamond-svg');
            if (!diamondSvg) return null;


            let shapes = Array.from(diamondSvg.querySelectorAll('path.rfc-facet'));

            if (!start) {
                shapes.forEach(s => {
                    s.style.stroke = "var(--neon)";
                    s.style.filter = "none";
                    s.style.strokeWidth = "1.4";
                    s.style.opacity = "1";
                });
                return null;
            }

            let currentIndex = 0;
            return setInterval(() => {

                if (shapes.length === 0) {
                    shapes = Array.from(diamondSvg.querySelectorAll('path.rfc-facet'));
                }

                shapes.forEach((s, index) => {
                    s.style.transition = "all 0.15s ease";
                    s.style.stroke = "rgba(225, 255, 0, 0.1)";
                    s.style.filter = "none";
                });

                if (shapes[currentIndex]) {
                    shapes[currentIndex].style.stroke = "#e1ff00";
                    shapes[currentIndex].style.filter = "drop-shadow(0 0 12px #e1ff00)";
                    shapes[currentIndex].style.strokeWidth = "2.2";
                }
                currentIndex = (currentIndex + 1) % shapes.length;
            }, 110);
        };

        async function updateLibraryStats() {
            const files = ['content/ui-motion.html', 'content/ui-button.html', 'content/ui-loader.html'];
            const idMap = {
                'content/ui-motion.html': 'count-ui-motion',
                'content/ui-button.html': 'count-ui-button',
                'content/ui-loader.html': 'count-ui-loader'
            };

            let total = 0;
            let allCreators = new Set();
            let allItems = [];

            const formatValue = (num) => {
                const str = num.toString().padStart(5, '0');
                const firstNonZero = str.search(/[1-9]/);
                if (firstNonZero === -1) return `<span class="digit-mute">00000</span>`;
                return `<span class="digit-mute">${str.substring(0, firstNonZero)}</span><span class="digit-active">${str.substring(firstNonZero)}</span>`;
            };

            for (const file of files) {
                try {
                    const response = await fetch(file + "?t=" + Date.now());
                    if (!response.ok) throw new Error("Fetch failed");

                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    const items = Array.from(doc.querySelectorAll('.anim-item'));

                    total += items.length;

                    const targetId = idMap[file];
                    if (document.getElementById(targetId)) {
                        document.getElementById(targetId).innerHTML = formatValue(items.length);
                    }

                    items.forEach(el => {
                        const creator = el.getAttribute('data-creator');
                        if (creator) allCreators.add(creator.trim());

                        allItems.push({
                            id: el.getAttribute('data-id'),
                            name: el.getAttribute('data-name'),
                            date: el.getAttribute('data-date') || "0000-00-00",

                            rawElement: el
                        });
                    });

                } catch (e) {
                    console.warn("Fehler bei " + file, e);
                }
            }


            if (allItems.length > 0) {

                allItems.sort((a, b) => b.date.localeCompare(a.date));
                const latest = allItems[0];


                const dashboardLabel = document.getElementById('latest-asset');
                if (dashboardLabel) {
                    dashboardLabel.textContent = latest.name;
                    dashboardLabel.title = latest.name; // Tooltip bei langem Namen
                }


                const featuredIframe = document.getElementById('featured-iframe');
                const featuredName = document.getElementById('featured-effect-name');
                const featuredLink = document.getElementById('featured-masterpiece-link');

                if (featuredIframe && latest.rawElement) {
                    const el = latest.rawElement;
                    const html = el.querySelector('.html-code').textContent;
                    const css = el.querySelector('.css-code').textContent;
                    const js = el.querySelector('.js-code') ? el.querySelector('.js-code').textContent : "";


                    if (featuredName) {
                        featuredName.textContent = `${latest.id} - ${latest.name}`;
                    }


                    let targetFile = "content/ui-button.html";
                    let btnLabel = "EXPLORE ALL BUTTONS →";

                    const idStr = String(latest.id);

                    if (idStr.startsWith('ID-5') || idStr.startsWith('5')) {
                        targetFile = "content/ui-loader.html";
                        btnLabel = "EXPLORE ALL LOADERS →";
                    } else if (idStr.startsWith('ID-8') || idStr.startsWith('8')) {
                        targetFile = "content/ui-motion.html";
                        btnLabel = "EXPLORE ALL MOTIONS →";
                    } else if (idStr.startsWith('ID-7') || idStr.startsWith('7')) {
                        targetFile = "content/ui-button.html";
                        btnLabel = "EXPLORE ALL BUTTONS →";
                    }

                    if (featuredLink) {
                        featuredLink.textContent = btnLabel;
                        featuredLink.onclick = (e) => {
                            e.preventDefault();
                            if (typeof loadContent === "function") loadContent(targetFile);
                        };
                    }


                    const previewFix = `<style>body, html { overflow: hidden !important; background: transparent !important; margin: 0; } .rfc-wrapper { height: 100vh !important; display: flex !important; justify-content: center !important; align-items: center !important; padding: 20px !important; } * { max-width: 100% !important; }</style>`;

                    featuredIframe.srcdoc = createIframeContent(html, css + previewFix, js);
                }
            }

            if (document.getElementById('count-total'))
                document.getElementById('count-total').innerHTML = formatValue(total);
            if (document.getElementById('count-creators'))
                document.getElementById('count-creators').innerHTML = formatValue(allCreators.size);
        }


        function rfcApplyColor(colorValue, element) {

            document.body.classList.add('rfc-color-changing');

            requestAnimationFrame(() => {

                document.documentElement.style.setProperty('--neon', colorValue);
                localStorage.setItem('rfc-selected-color', colorValue);


                document.querySelectorAll('.rfc-energy-node').forEach(node => node.classList.remove('rfc-active'));


                const matchingNodes = document.querySelectorAll(`.rfc-energy-node[onclick*="${colorValue}"]`);
                matchingNodes.forEach(node => node.classList.add('rfc-active'));


                const iframes = document.querySelectorAll('iframe');
                iframes.forEach(iframe => {
                    try {

                        if (iframe.contentWindow) {
                            iframe.contentWindow.postMessage({ type: 'COLOR_UPDATE', color: colorValue }, '*');
                        }


                        if (iframe.contentDocument && iframe.contentDocument.documentElement) {

                            iframe.contentDocument.documentElement.style.setProperty('--neon', colorValue, 'important');


                            let override = iframe.contentDocument.getElementById('rfc-live-fix');
                            if (!override) {
                                override = iframe.contentDocument.createElement('style');
                                override.id = 'rfc-live-fix';
                                iframe.contentDocument.head.appendChild(override);
                            }
                            override.textContent = ":root { --neon: " + colorValue + " !important; }";
                        }
                    } catch (e) {

                    }
                });
            });


            setTimeout(() => document.body.classList.remove('rfc-color-changing'), 900);
        }


        
       document.addEventListener("DOMContentLoaded", () => {
    // 1. Gespeicherte Farbe auslesen und direkt anwenden
    const savedColor = localStorage.getItem('rfc-selected-color');
    if (savedColor) {
        rfcApplyColor(savedColor, null);
    }

    // 2. Diamant-Animation und Hover-Effekte steuern
    const diamond = document.querySelector("#h-rfc-diamond-svg");
    const brandLink = document.querySelector(".brand-link");

    const finalizeDiamond = () => {
        if (diamond) {
            diamond.classList.add("is-finished");
            diamond.style.setProperty('--dash-offset', '0');
        }
    };

    // Diamant nach 5 Sekunden finalisieren
    setTimeout(finalizeDiamond, 5000);

    // Hover-Events nur binden, wenn beide Elemente existieren
    if (brandLink && diamond) {
        brandLink.addEventListener("mouseenter", () => {
            finalizeDiamond();
            diamond.classList.add("rfc-hover-active");
        });

        brandLink.addEventListener("mouseleave", () => {
            diamond.classList.remove("rfc-hover-active");
        });
    }

    // ==========================================
    // 3. SEO-UMSTELLUNG: ?page= STATT HASHTAGS
    // ==========================================

    // Zuordnung: Welche ID lädt welche HTML-Datei und welchen URL-Parameter
    const pageMapping = {
        'nav-home': { file: 'content/dashboard.html', param: 'home' },
        'nav-ui-loader': { file: 'content/ui-loader.html', param: 'ui-loader' },
        'nav-ui-motion': { file: 'content/ui-motion.html', param: 'ui-motion' },
        'nav-ui-button': { file: 'content/ui-button.html', param: 'ui-button' },
        'nav-submit': { file: 'content/submit.html', param: 'submit' },
        'nav-requests': { file: 'content/requests.html', param: 'requests' },
        'nav-about-logo': { file: 'content/about-logo.html', param: 'about-logo' },
        'nav-imprint': { file: 'content/imprint.html', param: 'imprint' },
        'nav-license': { file: 'content/license.html', param: 'license' },
        'nav-privacy': { file: 'content/privacy.html', param: 'privacy' },

        // Mobile Menüpunkte spiegeln dieselbe Logik
        'nav-home-mob': { file: 'content/dashboard.html', param: 'home' },
        'nav-ui-loader-mob': { file: 'content/ui-loader.html', param: 'ui-loader' },
        'nav-ui-motion-mob': { file: 'content/ui-motion.html', param: 'ui-motion' },
        'nav-ui-button-mob': { file: 'content/ui-button.html', param: 'ui-button' },
        'nav-submit-mob': { file: 'content/submit.html', param: 'submit' },
        'nav-requests-mob': { file: 'content/requests.html', param: 'requests' },
        'nav-about-logo-mob': { file: 'content/about-logo.html', param: 'about-logo' },
        'nav-imprint-mob': { file: 'content/imprint.html', param: 'imprint' },
        'nav-license-mob': { file: 'content/license.html', param: 'license' },
        'nav-privacy-mob': { file: 'content/privacy.html', param: 'privacy' }
    };

    // Klick-Events an alle Navigationselemente binden
    Object.keys(pageMapping).forEach(id => {
        const navElement = document.getElementById(id);
        if (navElement) {
            navElement.addEventListener('click', (e) => {
                e.preventDefault(); // Verhindert das Springen wegen href="#"
                
                const target = pageMapping[id];
                
                // Schreibt die URL sauber um zu: deineseite.de/?page=parameter (Ohne Seiten-Reload!)
                history.pushState({ page: target.file }, "", `?page=${target.param}`);
                
                // Lädt deinen Inhalt über deine bestehende Funktion
                if (typeof loadContent === "function") {
                    loadContent(target.file);
                }
            });
        }
    });

    // URL beim ersten Laden der Seite prüfen (Direktaufruf oder Google-Index)
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');

    if (pageParam) {
        // Sucht die passende Datei anhand des Parameters aus unserem Mapping
        const foundKey = Object.keys(pageMapping).find(key => pageMapping[key].param === pageParam);
        if (foundKey && typeof loadContent === "function") {
            loadContent(pageMapping[foundKey].file);
        }
    } else {
        // Standardseite laden, wenn kein Parameter in der URL steht (z.B. Home)
        if (typeof loadContent === "function") {
            loadContent('content/dashboard.html'); 
        }
    }

    // Den "Zurück"-Button des Browsers abfangen, damit die Seite mitslingt
    window.addEventListener('popstate', () => {
        const currentParams = new URLSearchParams(window.location.search);
        const currentParam = currentParams.get('page');
        
        if (currentParam) {
            const foundKey = Object.keys(pageMapping).find(key => pageMapping[key].param === currentParam);
            if (foundKey && typeof loadContent === "function") {
                loadContent(pageMapping[foundKey].file);
            }
        } else {
            if (typeof loadContent === "function") {
                loadContent('content/dashboard.html');
            }
        }
    });
});
